<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customy · LinkedIn company 1128×191</title>
  <link rel="stylesheet" href="/social/shared.css" />
  <style>
    .li-company {
      width: 1128px;
      height: 191px;
      padding: 32px 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .li-company .left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .li-company .wordmark { font-size: 24px; }
    .li-company .wordmark img { width: 28px; height: 28px; }
    .li-company .rule {
      width: 1px;
      height: 32px;
      background: rgba(255, 255, 255, 0.18);
    }
    .li-company .tag {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: -0.01em;
    }
    .li-company .meta { font-size: 13px; color: rgba(255, 255, 255, 0.6); }
    .li-company .dot {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .li-company .dot-g {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34c759;
    }
  </style>
</head>
<body>
  <div class="export-hint">LinkedIn company · 1128 × 191 · right-click → Capture node screenshot</div>
  <div class="canvas dark li-company">
    <div class="left">
      <span class="wordmark">
        <img src="/customy_logo_tr.png" alt="" />
        Customy
      </span>
      <span class="rule"></span>
      <span class="tag">Built for one brand. Yours.</span>
    </div>
    <span class="meta dot">
      <span class="dot-g"></span>
      Taking 2 clients this quarter
    </span>
  </div>
</body>
</html>
