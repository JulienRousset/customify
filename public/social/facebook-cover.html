<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customy · Facebook cover 820×312</title>
  <link rel="stylesheet" href="/social/shared.css" />
  <style>
    .fb-cover {
      width: 820px;
      height: 312px;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .fb-cover .wordmark { font-size: 18px; }
    .fb-cover .display { font-size: 52px; }
    .fb-cover .bottom { display: flex; align-items: flex-end; justify-content: space-between; }
    .fb-cover .meta { font-size: 11px; }
    .safe-zone {
      position: absolute;
      inset: 0 90px 0 90px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="export-hint">Facebook cover · 820 × 312 · safe zone 640 center · right-click → Capture node screenshot</div>
  <div class="canvas fb-cover">
    <div class="wordmark">
      <img src="/customy_logo.webp" alt="" />
      <span>Customy</span>
    </div>

    <h1 class="display">
      Built for one brand.<br />
      <span class="dim">Yours.</span>
    </h1>

    <div class="bottom">
      <div class="eyebrow" style="font-size: 11px;">Custom marketing & AI studio</div>
      <div class="meta">customy.agency</div>
    </div>
  </div>
</body>
</html>
