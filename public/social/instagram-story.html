<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customy · Instagram story 1080×1920</title>
  <link rel="stylesheet" href="/social/shared.css" />
  <style>
    .ig-story {
      width: 1080px;
      height: 1920px;
      padding: 140px 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .ig-story .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ig-story .wordmark { font-size: 32px; }
    .ig-story .wordmark img { width: 36px; height: 36px; }
    .ig-story .eyebrow { font-size: 18px; }
    .ig-story .display {
      font-size: 164px;
      line-height: 0.98;
    }
    .ig-story .middle {
      display: flex;
      flex-direction: column;
      gap: 64px;
      padding: 0 10px;
    }
    .ig-story .sub {
      font-size: 22px;
      color: var(--sub);
      line-height: 1.4;
      max-width: 720px;
      font-weight: 500;
    }
    .ig-story .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .ig-story .meta { font-size: 18px; }
    .ig-story .chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--fg);
      color: var(--bg);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .ig-story .chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34c759;
    }
  </style>
</head>
<body>
  <div class="export-hint">IG story · 1080 × 1920 · right-click → Capture node screenshot</div>
  <div class="canvas ig-story">
    <div class="top">
      <span class="wordmark">
        <img src="/customy_logo.webp" alt="" />
        Customy
      </span>
      <span class="eyebrow">Studio</span>
    </div>

    <div class="middle">
      <p class="eyebrow">
        <span class="accent-dot" style="vertical-align: middle; margin-right: 12px;"></span>
        Custom marketing &amp; AI studio
      </p>
      <h1 class="display">
        Built for<br />
        one brand.<br />
        <span class="dim">Yours.</span>
      </h1>
      <p class="sub">No templates. No packaged plans. We design every system around how your business actually runs.</p>
    </div>

    <div class="bottom">
      <span class="chip"><span class="dot"></span>2 clients this quarter</span>
      <span class="meta">customy.agency</span>
    </div>
  </div>
</body>
</html>
