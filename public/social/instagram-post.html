<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customy · Instagram post 1080×1350</title>
  <link rel="stylesheet" href="/social/shared.css" />
  <style>
    .ig-post {
      width: 1080px;
      height: 1350px;
      padding: 96px 92px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .ig-post .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ig-post .wordmark { font-size: 28px; }
    .ig-post .wordmark img { width: 32px; height: 32px; }
    .ig-post .eyebrow { font-size: 15px; }
    .ig-post .display {
      font-size: 112px;
      line-height: 0.98;
      letter-spacing: -0.04em;
    }
    .ig-post .middle {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }
    .ig-post .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .ig-post .rule {
      width: 56px;
      height: 2px;
      background: var(--fg);
      margin-bottom: 8px;
    }
    .ig-post .sub {
      font-size: 18px;
      color: var(--sub);
      font-weight: 500;
    }
    .ig-post .meta { font-size: 16px; }
  </style>
</head>
<body>
  <div class="export-hint">IG feed post · 1080 × 1350 · right-click → Capture node screenshot</div>
  <div class="canvas ig-post">
    <div class="top">
      <span class="wordmark">
        <img src="/customy_logo_tr.png" alt="" />
        Customy
      </span>
      <span class="eyebrow">Studio</span>
    </div>

    <div class="middle">
      <div class="rule"></div>
      <h1 class="display">
        No templates.<br />
        No packaged<br />
        plans.
      </h1>
      <p class="sub">We design every system around how your business actually runs.</p>
    </div>

    <div class="bottom">
      <span class="meta">Built for one brand. Yours.</span>
      <span class="meta" style="font-family: 'Geist Mono', monospace;">customy.agency</span>
    </div>
  </div>
</body>
</html>
