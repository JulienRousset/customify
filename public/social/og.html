<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customy · OG image 1200×630</title>
  <link rel="stylesheet" href="/social/shared.css" />
  <style>
    .og {
      width: 1200px;
      height: 630px;
      padding: 80px 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .og .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .og .wordmark { font-size: 26px; }
    .og .wordmark img { width: 30px; height: 30px; }
    .og .eyebrow { font-size: 14px; }
    .og .display {
      font-size: 100px;
      line-height: 1.0;
      letter-spacing: -0.04em;
    }
    .og .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .og .meta { font-size: 16px; letter-spacing: 0.04em; }
    .og .glow {
      position: absolute;
      bottom: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.18), transparent 60%);
      filter: blur(50px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="export-hint">OG · 1200 × 630 · right-click → Capture node screenshot, save as public/og.jpg</div>
  <div class="canvas og">
    <div class="glow"></div>

    <div class="top">
      <span class="wordmark">
        <img src="/customy_logo.webp" alt="" />
        Customy
      </span>
      <p class="eyebrow">Custom marketing &amp; AI studio</p>
    </div>

    <h1 class="display">
      Every business is unique,<br />
      <span class="dim">yours should be too.</span>
    </h1>

    <div class="bottom">
      <p class="meta">customy.agency</p>
      <p class="meta">@customyagency</p>
    </div>
  </div>
</body>
</html>
