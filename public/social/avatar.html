<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customy · Avatar 1024×1024</title>
  <link rel="stylesheet" href="/social/shared.css" />
  <style>
    .avatar {
      width: 1024px;
      height: 1024px;
      background: #1D1D1F;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .avatar .glyph {
      font-family: 'Geist', sans-serif;
      font-weight: 600;
      font-size: 680px;
      color: #fff;
      letter-spacing: -0.08em;
      line-height: 1;
      transform: translateY(-16px);
    }
    .avatar .dot {
      position: absolute;
      top: 260px;
      right: 260px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #0071e3;
    }
  </style>
</head>
<body>
  <div class="export-hint">Avatar · 1024 × 1024 · right-click → Capture node screenshot</div>
  <div class="canvas avatar">
    <span class="glyph">C</span>
    <span class="dot"></span>
  </div>
</body>
</html>
