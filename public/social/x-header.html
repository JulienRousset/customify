<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customy · X header 1500×500</title>
  <link rel="stylesheet" href="/social/shared.css" />
  <style>
    .x-header {
      width: 1500px;
      height: 500px;
      padding: 70px 96px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 36px;
    }
    .x-header .eyebrow { font-size: 15px; }
    .x-header .display { font-size: 112px; }
    .x-header .meta { font-size: 14px; letter-spacing: 0.04em; }
    .x-header .glow {
      position: absolute;
      bottom: -140px;
      right: -140px;
      width: 440px;
      height: 440px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.18), transparent 60%);
      filter: blur(40px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="export-hint">X / Twitter header · 1500 × 500 · avatar crops bottom-left · right-click → Capture node screenshot</div>
  <div class="canvas dark x-header">
    <div class="glow"></div>

    <p class="eyebrow">
      <span class="accent-dot" style="vertical-align: middle; margin-right: 10px;"></span>
      Custom marketing &amp; AI studio
    </p>

    <h1 class="display">
      Built for one brand.<br />
      <span class="dim">Yours.</span>
    </h1>

    <p class="meta">customy.agency &nbsp;·&nbsp; @customyagency</p>
  </div>
</body>
</html>
